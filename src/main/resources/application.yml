server:
  port: 8080

cors:
  originsPatterns: ${FRONTEND_URL_1}

spring:
  application:
    name: pitcherx

  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${BD_SERVER}:${BD_PORT}/${BD_NAME}
    username: ${BD_USER}
    password: ${BD_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    clean-disabled: false
    baseline-version: 0.1.0
    validate-on-migrate: false

spring-doc:
  enabled: true

logging:
  level:
    root: INFO
    org:
      springframework:
        web: INFO
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql: WARN



